name: Deploy to InfinityFree

on:
  push:
    branches:
      - main  # mainにpushされた時に実行

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ファイルをFTPでそのままアップロードするだけ
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # アップロードする元のディレクトリ（通常はリポジトリのルート）
          local-dir: ./
          # InfinityFree側の保存先（通常は /htdocs/）
          server-dir: /htdocs/
          # デプロイから除外するファイル（必要に応じて追加）
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md